<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventareameESTA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- VISTA LOGIN -->
    <div id="auth-view" class="auth-container">
        <div class="auth-card">
            <h1>InventareameESTA</h1>
            <div class="card-inner">
                <h2>Bienvenido</h2>
                <div id="msg" class="msg"></div>
                <form onsubmit="event.preventDefault(); login();">
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="submit" class="auth-btn">Iniciar Sesión</button>
                </form>
                <button onclick="register()" class="auth-btn register">Registrarse</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">
        <div class="header">
            <span id="user-info" class="user-badge"></span>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('products', this)">Productos</button>
            <button class="tab-btn" onclick="showTab('orders', this)">Pedidos</button>
            <button id="low-stock-btn" class="tab-btn" onclick="showTab('low-stock', this)" style="display:none;">Bajo Stock</button>
        </div>

        <!-- PRODUCTOS -->
        <div id="products-tab" class="tab-content active">
            <div class="table-header">
                <h3>Lista de Productos</h3>
                <button id="btn-add-product" class="btn-primary" onclick="openAddModal()">+ Añadir Producto</button>
            </div>
            <div id="product-list"></div>
        </div>

        <!-- PEDIDOS -->
               <!-- PEDIDOS -->
        <div id="orders-tab" class="tab-content">
            <h3 style="margin-bottom: 15px;">Crear Pedido</h3>
            <div id="order-items-build" style="margin-bottom: 10px;"></div>
            <button class="btn-primary" onclick="addOrderItemRow()" style="margin-right:10px;">+ Agregar Fila</button>
            <button class="btn-primary" style="background:var(--success);" onclick="createOrder()">Confirmar Pedido</button>
            
            <hr style="margin: 30px 0; border:0; border-top:1px solid #eee;">
            
            <div class="table-header">
                <h3>Historial de Pedidos</h3>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="order-search" placeholder="Buscar por ID" min="1" step="1" style="padding:8px 12px; border:1px solid var(--border); border-radius:6px; width: 150px;">
                    <button class="btn-primary" onclick="searchOrder()" style="padding: 8px 15px;">Buscar</button>
                </div>
            </div>
            <div id="order-list"></div> <!-- Aquí se cargará la lista completa -->
            <div id="order-details" style="display:none;"></div>
        </div>

        <!-- BAJO STOCK -->
        <div id="low-stock-tab" class="tab-content">
            <h3>Productos con Bajo Stock</h3>
            <div id="low-stock-list" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- MODAL PARA PRODUCTOS -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Agregar Producto</h2>
                <button class="close-btn" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="p-name" required>
                </div>
                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" id="p-sku" required>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;">
                        <label>Stock</label>
                        <input type="number" id="p-stock" min="0" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Stock Mínimo</label>
                        <input type="number" id="p-minStock" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Precio</label>
                    <input type="number" id="p-price" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" id="p-category" placeholder="Ej: Bebidas" required>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeProductModal()">Cancelar</button>
                <button class="btn-primary" id="btn-save-product" onclick="saveProduct()">Guardar</button>
            </div>
        </div>
    </div>


        <!-- MODAL PARA DETALLE DE PEDIDOS -->
    <div id="order-modal" class="modal-overlay">
        <div class="modal" style="width: 550px;">
            <div class="modal-header">
                <h2 id="order-modal-title">Detalle de Pedido</h2>
                <button class="close-btn" onclick="closeOrderModal()">&times;</button>
            </div>
            <div id="order-modal-body" class="modal-body">
                <!-- Aquí se cargará la info del pedido -->
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeOrderModal()">Cerrar</button>
            </div>
        </div>
    </div>

   

    <script src="app.js"></script>
</body>
</html>
